<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0e0e0e" />
    
    <title>Next Creatives | Vídeos com IA para o seu Negócio</title>
    <meta name="description" content="Agência focada em produção de vídeos e conteúdo através de Inteligência Artificial para alavancar seu negócio." />
    
    <!-- Fonts: preconnect + stylesheet bloqueante para eliminar FOUT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Carrega a stylesheet de fontes de forma síncrona (bloqueante) para garantir
      que o @font-face com display=swap seja registrado antes do primeiro paint.
      Separamos Manrope (crítica, headline/hero) do restante para priorização.
    -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400&family=Inter:wght@100;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" />
    
    <!-- Open Graph Data -->
    <meta property="og:title" content="Next Creatives | Vídeos com IA para o seu Negócio" />
    <meta property="og:description" content="Agência focada em produção de vídeos e conteúdo através de Inteligência Artificial para alavancar seu negócio." />
    <meta property="og:image" content="https://www.nextcreativestudio.com/og-banner.png" />
    <meta property="og:type" content="website" />
    
    <!-- Favicon configs (Sizes) -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="shortcut icon" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
